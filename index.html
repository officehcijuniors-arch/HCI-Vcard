<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Team Übersicht</title>

<style>
/* Fonts */
@font-face {
  font-family: "Areno Serif";
  src: url("areno-serif-webfont.woff2") format("woff2"),
       url("areno-serif-webfont.woff") format("woff");
  font-weight: normal;
  font-style: normal;
}

body {
  margin: 0;
  font-family: "Areno Serif", serif;
  background: #f5f6f8;
  color: #003789;
}

/* Header */
.header {
  text-align: center;
  padding: 60px 20px 30px;
  background: linear-gradient(135deg, #003789, #001f44);
  color: white;
}

.logo {
  width: 140px;
  height: auto;
  margin-bottom: 15px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
}

.title {
  font-size: 28px;
  letter-spacing: 1px;
}

/* Container */
.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
}

/* Card List */
ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  margin-bottom: 15px;
}

li a {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 18px 20px;
  border-radius: 12px;

  text-decoration: none;
  background: white;
  border-left: 6px solid #d42323;

  box-shadow: 0 8px 20px rgba(0,0,0,0.06);

  transition: all 0.2s ease;
}

li a:hover {
  transform: translateY(-2px);
  border-left-color: #003789;
}

.role {
  font-size: 14px;
  color: #d42323;
  font-weight: 500;
}
</style>
</head>

<body>

<header class="header">
  <img src="HAI.png" alt="Logo" class="logo">
  <div class="title">Team Übersicht</div>
</header>

<div class="container">

  <ul>
    <li>
      <a href="Singer Mirjam/">
        <span>Mirjam Singer</span>
        <span class="role">Finanzen und TeamWear+</span>
      </a>
    </li>
  </ul>

</div>

</body>
</html><li>
