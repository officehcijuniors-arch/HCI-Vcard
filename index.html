<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team Landing</title>

<style>
@font-face {
  font-family: "Areno Serif";
  src: url("areno-serif-webfont.woff2") format("woff2"),
       url("areno-serif-webfont.woff") format("woff");
}

:root {
  --blue: #003789;
  --red: #d42323;
  --bg: #ffffff;
  --text: #0b0f19;
  --muted: rgba(0,0,0,0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Areno Serif", serif;
  background: var(--bg);
  color: var(--text);
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.7);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

nav .logo-small {
  height: 32px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

.hero-inner {
  max-width: 900px;
}

.hero img {
  width: 140px;
  margin-bottom: 30px;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
}

h1 {
  font-size: 64px;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

p {
  font-size: 20px;
  color: var(--muted);
  line-height: 1.6;
}

/* BUTTON */
.cta {
  margin-top: 40px;
  display: inline-block;
  padding: 14px 26px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 16px;
  color: white;
  background: linear-gradient(135deg, var(--blue), var(--red));
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.cta:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* SECTION */
.section {
  padding: 120px 40px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  font-size: 40px;
  margin-bottom: 40px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  padding: 24px;
  border-radius: 18px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.card h3 {
  margin-bottom: 8px;
}

.role {
  color: var(--red);
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
}
</style>
</head>

<body>

<nav>
  <img src="HAI.png" class="logo-small" alt="Logo">
  <div style="font-size:14px; color:rgba(0,0,0,0.6);">Team Overview</div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <img src="HAI.png" alt="Logo">
    <h1>Ein Team. Eine Vision.</h1>
    <p>
      Klar strukturiert, modern organisiert und mit Fokus auf Finanzen,
      TeamWear+ und Zusammenarbeit.
    </p>

    <a class="cta" href="#team">Team entdecken</a>
  </div>
</div>

<section class="section" id="team">
  <h2>Team</h2>

  <div class="grid">

    <a class="card" href="Singer Mirjam/" style="text-decoration:none; color:inherit;">
      <h3>Mirjam Singer</h3>
      <div class="role">Finanzen & TeamWear+</div>
    </a>

  </div>
</section>

<footer>
  © 2026 Team • Designed minimal & modern
</footer>

</body>
</html>
